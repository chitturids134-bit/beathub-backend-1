version: "3.8"

services:
  api:
    container_name: beathub_api
    build:
      context: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      MONGO_URI: ${MONGO_URI}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-20}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - beathub-net
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "const net=require('net');const s=net.connect(3000,'127.0.0.1',()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),3000);"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  db:
    container_name: beathub_db
    image: mongo:6
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - db-data:/data/db
    networks:
      - beathub-net
    healthcheck:
      test:
        - CMD-SHELL
        - "echo 'db.runCommand({ ping: 1 }).ok' | mongosh mongodb://$$MONGO_INITDB_ROOT_USERNAME:$$MONGO_INITDB_ROOT_PASSWORD@localhost:27017/admin --quiet | grep 1"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  prometheus_data:
  grafana_data:

  jaeger_data:

networks:
  beathub-net:

# --- Observability Stack ---
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - beathub-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    depends_on:
      - prometheus
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - beathub-net

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686" # Jaeger UI
      - "6831:6831/udp" # Jaeger agent
      - "14268:14268" # Collector HTTP
    volumes:
      - jaeger_data:/badger
    networks:
      - beathub-net